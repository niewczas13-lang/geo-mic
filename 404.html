<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strona nie znaleziona — GEO-MIC</title>
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #0c0a08;
      color: #ede8e3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap {
      max-width: 540px;
    }
    .code {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(5rem, 20vw, 8rem);
      color: #d4a043;
      line-height: 1;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }
    p {
      color: #9b918a;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a.btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #d4a043;
      color: #0c0a08;
      text-decoration: none;
      font-weight: 600;
      border-radius: 4px;
    }
    a.btn-ghost {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border: 1px solid rgba(155,145,138,0.3);
      color: #ede8e3;
      text-decoration: none;
      border-radius: 4px;
    }
    .contact {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(155,145,138,0.15);
      color: #9b918a;
      font-size: 0.9rem;
    }
    .contact a { color: #d4a043; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Nie znaleziono strony</h1>
    <p>Strona, której szukasz, nie istnieje lub została przeniesiona. Wróć na stronę główną lub skontaktuj się z nami bezpośrednio.</p>
    <div class="links">
      <a class="btn" href="/">Strona główna</a>
      <a class="btn-ghost" href="/blog/">Poradniki geodezyjne</a>
    </div>
    <div class="contact">
      <p>Potrzebujesz pomocy? Zadzwoń: <a href="tel:+48793369234">793 369 234</a> lub napisz: <a href="mailto:geo@geo-mic.radom.pl">geo@geo-mic.radom.pl</a></p>
    </div>
  </div>
</body>
</html>
