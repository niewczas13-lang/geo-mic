<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Footer Jasny — GEO-MIC</title>
  <style>
    body { background: #f0f0f0; padding: 40px; font-family: Arial, sans-serif; margin: 0; }

    @media only screen and (max-width: 520px) {
      .footer-wrapper  { max-width: 100% !important; }
      .col-logo        { display: block !important; width: 100% !important; padding: 0 0 20px 0 !important; border-right: none !important; border-bottom: 1px solid #e8e0d5 !important; }
      .col-contact     { display: block !important; width: 100% !important; padding: 20px 0 !important; border-right: none !important; border-bottom: 1px solid #e8e0d5 !important; }
      .col-offices     { display: block !important; width: 100% !important; padding: 20px 0 0 0 !important; }
    }
  </style>
</head>
<body>

<!--
  ================================================================
  FOOTER DO MAILA — GEO-MIC
  Jak wkleić do Gmaila:
    1. Otwórz ten plik w Chrome
    2. Zaznacz wszystko między złotą linią a "Wszelkie prawa..."
    3. Ctrl+C → wklej do treści maila w Gmail (Ctrl+V)
  ================================================================
-->

<table class="footer-wrapper" width="680" cellpadding="0" cellspacing="0" border="0"
       style="font-family: Arial, Helvetica, sans-serif; max-width: 680px; width: 100%;">

  <!-- Złota linia górna -->
  <tr>
    <td style="padding-top: 20px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="height: 3px; background-color: #d4a043;"></td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Główny blok — jasne tło -->
  <tr>
    <td style="background-color: #faf8f5; padding: 24px 28px 20px 28px;
               border: 1px solid #e8e0d5; border-top: none; border-radius: 0 0 6px 6px;">

      <!-- Trzy kolumny -->
      <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>

          <!-- 1. Logo + tagline -->
          <td class="col-logo" width="185" valign="top"
              style="padding-right: 24px; border-right: 1px solid #e8e0d5; vertical-align: top;">
            <img src="https://geo-mic.radom.pl/logo_email.svg"
                 alt="GEO-MIC Usługi Geodezyjne"
                 width="155" height="101"
                 style="display: block; border: 0; margin-bottom: 10px;">
            <p style="margin: 0; font-size: 12px; color: #6b6058; line-height: 1.6;">
              Usługi Geodezyjne<br>
              <span style="color: #c08c30; font-size: 11px; letter-spacing: 0.5px;">od 2011 roku</span>
            </p>
          </td>

          <!-- 2. Kontakt -->
          <td class="col-contact" valign="top"
              style="padding: 0 24px; border-right: 1px solid #e8e0d5; vertical-align: top;">
            <p style="margin: 0 0 5px 0; font-size: 10px; font-weight: bold;
                      letter-spacing: 1.5px; color: #c08c30; text-transform: uppercase;">
              Kontakt
            </p>
            <p style="margin: 0 0 10px 0; font-size: 14px; font-weight: bold; color: #1a1614;">
              Ewelina Michalik
            </p>

            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="padding-bottom: 6px; font-size: 13px; color: #2a2220;">
                  <a href="tel:+48793369234"
                     style="color: #2a2220; text-decoration: none;">
                    📞&nbsp; 793 369 234
                  </a>
                </td>
              </tr>
              <tr>
                <td style="padding-bottom: 6px; font-size: 13px;">
                  <a href="mailto:geo@geo-mic.radom.pl"
                     style="color: #c08c30; text-decoration: none; font-weight: bold;">
                    ✉&nbsp; geo@geo-mic.radom.pl
                  </a>
                </td>
              </tr>
              <tr>
                <td style="font-size: 12px;">
                  <a href="https://geo-mic.radom.pl"
                     style="color: #6b6058; text-decoration: none;">
                    🌐&nbsp; geo-mic.radom.pl
                  </a>
                </td>
              </tr>
            </table>
          </td>

          <!-- 3. Biura -->
          <td class="col-offices" valign="top"
              style="padding-left: 24px; vertical-align: top;">
            <p style="margin: 0 0 5px 0; font-size: 10px; font-weight: bold;
                      letter-spacing: 1.5px; color: #c08c30; text-transform: uppercase;">
              Biura
            </p>

            <p style="margin: 0 0 12px 0; font-size: 12px; color: #6b6058; line-height: 1.7;">
              <span style="color: #1a1614; font-weight: bold; font-size: 13px;">Radom</span><br>
              ul. Gen. J. Sowińskiego 8/1<br>
              26-609 Radom
            </p>

            <p style="margin: 0; font-size: 12px; color: #6b6058; line-height: 1.7;">
              <span style="color: #1a1614; font-weight: bold; font-size: 13px;">Łuków</span><br>
              ul. Kiernickich 84<br>
              21-400 Łuków
            </p>
          </td>

        </tr>
      </table>

      <!-- Pasek dolny -->
      <table width="100%" cellpadding="0" cellspacing="0" border="0"
             style="margin-top: 20px; border-top: 1px solid #e8e0d5;">
        <tr>
          <td style="padding-top: 14px;">
            <p style="margin: 0; font-size: 11px; color: #9b918a; line-height: 1.6;">
              Pn–Pt: 8:00–16:00
              <span style="color: #d8cfc8;">&nbsp;|&nbsp;</span>
              © 2026 GEO-MIC Ewelina Michalik. Wszelkie prawa zastrzeżone.
            </p>
          </td>
        </tr>
      </table>

    </td>
  </tr>

</table>

</body>
</html>
